<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - BlueWave Restaurant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="index.css" />
    <link rel="stylesheet" href="Login.css" />
    <script src="Login.js" defer></script>
</head>
<body>
    <nav class="main-nav">
        <div class="brand"><span class="dot"></span><a href="index.html" class="link">BlueWave Restaurant</a></div>
        <div class="links">
            <a href="index.html">Home</a>
            <a href="product.html">Products</a>
            <a href="about.html">About</a>
            <a href="Contact.html">Contact</a>
            <a href="Login.html" class="active">Login</a>
        </div>
    </nav>

    <div class="login-container">
        <div class="login-form-wrapper">
            <!-- Sign In Form -->
            <div class="form-section" id="signInSection">
                <h1>Sign In</h1>
                <form id="signInForm" action="#" method="post" novalidate>
                    <div class="form-group">
                        <label for="signInEmail">Email</label>
                        <input type="email" id="signInEmail" name="email" placeholder="Enter your email" autocomplete="email" required />
                    </div>

                    <div class="form-group">
                        <label for="signInPassword">Password</label>
                        <input type="password" id="signInPassword" name="password" placeholder="Enter your password" autocomplete="current-password" required />
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" name="remember" /> Remember me
                        </label>
                        <a href="#" class="forgot-password">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn-primary">Sign In</button>
                </form>

                <div class="form-footer">
                    <p>Don't have an account? <a href="#" id="toggleSignUp" class="link">Sign Up</a></p>
                </div>
            </div>

            <!-- Sign Up Form -->
            <div class="form-section hidden" id="signUpSection">
                <h1>Create Account</h1>
                <form id="signUpForm" action="#" method="post" novalidate>
                    <div class="form-group">
                        <label for="signUpName">Full Name</label>
                        <input type="text" id="signUpName" name="name" placeholder="Enter your full name" autocomplete="name" required />
                    </div>

                    <div class="form-group">
                        <label for="signUpEmail">Email</label>
                        <input type="email" id="signUpEmail" name="email" placeholder="Enter your email" autocomplete="email" required />
                    </div>

                    <div class="form-group">
                        <label for="signUpPassword">Password</label>
                        <input type="password" id="signUpPassword" name="password" placeholder="Create a password" autocomplete="new-password" required />
                    </div>

                    <div class="form-group">
                        <label for="signUpConfirm">Confirm Password</label>
                        <input type="password" id="signUpConfirm" name="confirm" placeholder="Confirm your password" autocomplete="new-password" required />
                    </div>

                    <button type="submit" class="btn-primary">Sign Up</button>
                </form>

                <div class="form-footer">
                    <p>Already have an account? <a href="#" id="toggleSignIn" class="link">Sign In</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="nav.js"></script>
</body>
</html>
